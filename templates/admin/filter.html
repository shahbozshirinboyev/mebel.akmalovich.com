{% load i18n %}
<div class="admin-filter-dropdown">
  <label>
    <span>{{ title }}</span>
    <select onchange="if (this.value) { window.location.href = this.value; }">
      {% for choice in choices %}
        <option value="{{ choice.query_string|iriencode }}"{% if choice.selected %} selected{% endif %}>
          {{ choice.display }}
        </option>
      {% endfor %}
    </select>
  </label>
</div>
